<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos — JUSKEV Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/styles.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">

  <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

  <main class="admin-main">
    <div class="admin-topbar">
      <h1 class="admin-page-title">Productos</h1>
      <a th:href="@{/admin/productos/nuevo}" class="btn-nuevo-producto">+ Agregar Producto</a>
    </div>

    <div th:if="${exito}" class="alert-exito" th:text="${exito}"></div>
    <div th:if="${error}" class="alert-error" th:text="${error}"></div>

    <div class="admin-card">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Imagen</th>
            <th>Nombre</th>
            <th>Categoría</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(productos)}">
            <td colspan="7" style="text-align:center; padding:2rem; color:#8a8a8a">
              No hay productos. <a th:href="@{/admin/productos/nuevo}">Agrega el primero →</a>
            </td>
          </tr>
          <tr th:each="p : ${productos}">
            <td>
              <img th:src="${p.imagenUrl ?: '/img/logo.png'}" th:alt="${p.nombre}"
                   onerror="this.src='/img/logo.png'" class="producto-thumb-admin">
            </td>
            <td>
              <div class="producto-nombre-admin" th:text="${p.nombre}"></div>
              <div class="producto-marca-admin" th:text="${p.marca}"></div>
            </td>
            <td th:text="${#strings.capitalize(p.categoria.name())}"></td>
            <td>
              <div th:text="${'$' + #numbers.formatInteger(p.precioFinal, 0, 'COMMA')}"></div>
              <div th:if="${p.descuento > 0}" class="descuento-label"
                   th:text="'-' + ${p.descuento} + '%'"></div>
            </td>
            <td>
              <span th:text="${p.stock}"
                    th:classappend="${p.stock == 0} ? 'stock-cero' : (${p.stock <= 5} ? 'stock-bajo-label' : '')">
              </span>
            </td>
            <td>
              <span th:if="${p.activo and p.stock > 0}" class="estado-badge estado-completado">Activo</span>
              <span th:if="${p.activo and p.stock == 0}" class="estado-badge estado-pendiente">Sin Stock</span>
              <span th:if="${!p.activo}" class="estado-badge estado-cancelado">Inactivo</span>
            </td>
            <td class="acciones-col">
              <a th:href="@{/admin/productos/editar/{id}(id=${p.id})}"
                 class="btn-accion btn-editar">✏️</a>
              <form th:action="@{/admin/productos/eliminar/{id}(id=${p.id})}"
                    method="post" style="display:inline"
                    onsubmit="return confirm('¿Desactivar este producto?')">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn-accion btn-eliminar">🗑️</button>
              </form>





            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>

</body>
</html>
