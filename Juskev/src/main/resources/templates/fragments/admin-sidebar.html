<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<aside th:fragment="sidebar" class="admin-sidebar">
  <div class="sidebar-logo">
    <img th:src="@{/img/logo.png}" alt="JUSKEV">
    <span class="sidebar-admin-label">ADMIN</span>
  </div>

  <div class="sidebar-nav">
    <a th:href="@{/admin/dashboard}"
       th:classappend="${currentUri != null and currentUri.contains('/dashboard')} ? 'active'"
       class="sidebar-link">
      <span class="sidebar-icon">📊</span> Dashboard
    </a>
    <a th:href="@{/admin/productos}"
       th:classappend="${currentUri != null and currentUri.contains('/productos')} ? 'active'"
       class="sidebar-link">
      <span class="sidebar-icon">👕</span> Productos
    </a>
    <a th:href="@{/admin/stock}"
       th:classappend="${currentUri != null and currentUri.contains('/stock')} ? 'active'"
       class="sidebar-link">
      <span class="sidebar-icon">📦</span> Stock
    </a>
    <a th:href="@{/admin/clientes}"
       th:classappend="${currentUri != null and currentUri.contains('/clientes')} ? 'active'"
       class="sidebar-link">
      <span class="sidebar-icon">👥</span> Clientes
    </a>
    <a th:href="@{/admin/pedidos}"
       th:classappend="${currentUri != null and currentUri.contains('/pedidos')} ? 'active'"
       class="sidebar-link">
      <span class="sidebar-icon">🛒</span> Pedidos
    </a>
    <a th:href="@{/admin/venta-fisica}"
       th:classappend="${currentUri != null and currentUri.contains('/venta-fisica')} ? 'active'"
       class="sidebar-link">
      <span class="sidebar-icon">🧾</span> Venta Física
    </a>

    <div class="sidebar-divider"></div>

    <a th:href="@{/}" target="_blank" class="sidebar-link">
      <span class="sidebar-icon">🌐</span> Ver Sitio
    </a>

      <form th:action="@{/auth/logout}" method="post" style="margin:0">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="sidebar-link sidebar-link-logout"
              style="width:100%;text-align:left;background:none;border:none;cursor:pointer;">
        <span class="sidebar-icon">🚪</span> Cerrar Sesión
      </button>
      </form>

  </div>
</aside>

</body>
</html>
