# Servidor
server.port=${PORT:8080}

# ─── BASE DE DATOS POSTGRESQL ───
#spring.datasource.url=jdbc:postgresql://localhost:5432/juskev_db
#spring.datasource.username=postgres
#spring.datasource.password=sebas117
#spring.datasource.driver-class-name=org.postgresql.Driver

# ─── BASE DE DATOS (Supabase) ───
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / HIBERNATE ───
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true


# ─── THYMELEAF ───
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.suffix=.html

# ─── SUBIDA DE ARCHIVOS (imágenes de productos) ───
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Ruta ABSOLUTA donde se guardan las imágenes subidas.
# Usa una carpeta fuera del proyecto para que persista entre reinicios.
# Windows: app.upload.dir=C:/juskev-uploads/productos
# Linux/Mac: app.upload.dir=/var/juskev-uploads/productos
app.upload.dir=${user.home}/juskev-uploads/productos

# ─── CREDENCIALES ADMIN (cambiar en producción) ───
app.admin.email=admin@juskev.com
app.admin.password=Admin2026#

# ─── NOMBRE DE LA TIENDA ───
app.tienda.nombre=JUSKEV
app.tienda.descripcion=Moda masculina de alta calidad

# ─── LOGGING ───
logging.level.com.juskev=INFO
logging.level.org.springframework.security=WARN
