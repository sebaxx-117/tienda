<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<div th:fragment="carrito">
  <!-- Overlay -->
  <div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>

  <!-- Sidebar -->
  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h2>Tu Carrito</h2>
      <button class="cart-close" onclick="closeCart()">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-subtotal">
        <span class="cart-subtotal-label">Subtotal</span>
        <span class="cart-subtotal-value" id="cartTotal">$0</span>
      </div>

      <!-- Botón único: el JS decide qué hacer según si hay sesión o no -->
      <button class="btn-checkout" onclick="finalizarCompra()">Finalizar Compra</button>
      <button class="btn-continue" onclick="closeCart()">Seguir Comprando</button>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>
</div>

</body>
</html>
