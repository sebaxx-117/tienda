<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión — JUSKEV</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/styles.css}">
  <link rel="stylesheet" th:href="@{/css/navbar.css}">
  
</head>
<body>

  <div th:replace="~{fragments/navbar :: navbar}"></div>

  <div class="auth-page">
    <div class="login-box standalone">
      <div class="login-logo"><img th:src="@{/img/logo.png}" alt="JUSKEV"></div>
      <div class="login-subtitle">Accede a tu cuenta</div>

      <div th:if="${errorRegistro}" class="alert-error" th:text="${errorRegistro}"></div>

      <div class="login-tabs">
        <button class="login-tab" id="tabBtnLogin"
                th:classappend="${param.tab == null or param.tab[0] != 'registro'} ? 'active'"
                onclick="switchTab('login')">Iniciar Sesión</button>
        <button class="login-tab" id="tabBtnRegistro"
                th:classappend="${param.tab != null and param.tab[0] == 'registro'} ? 'active'"
                onclick="switchTab('registro')">Crear Cuenta</button>
      </div>

      <!-- LOGIN -->
      <div class="tab-content" id="tab-login"
           th:classappend="${param.tab == null or param.tab[0] != 'registro'} ? 'active'">
        <form th:action="@{/auth/login}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div th:if="${param.error}" class="alert-error">Correo o contraseña incorrectos.</div>
          <div class="form-group">
            <label class="form-label">Correo Electrónico</label>
            <input type="email" name="email" class="form-input" placeholder="tu@correo.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-input" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn-submit">Iniciar Sesión</button>
        </form>
      </div>

      <!-- REGISTRO -->
      <div class="tab-content" id="tab-registro"
           th:classappend="${param.tab != null and param.tab[0] == 'registro'} ? 'active'">
        <form th:action="@{/auth/registro}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="form-group">
            <label class="form-label">Nombre Completo</label>
            <input type="text" name="nombre" class="form-input" placeholder="Tu nombre" required>
          </div>
          <div class="form-group">
            <label class="form-label">Correo Electrónico</label>
            <input type="email" name="email" class="form-input" placeholder="tu@correo.com" required>
          </div>
          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input type="password" name="password" class="form-input" placeholder="Mínimo 8 caracteres" required>
          </div>
          <div class="form-group">
            <label class="form-label">Confirmar Contraseña</label>
            <input type="password" name="confirmPassword" class="form-input" placeholder="Repite la contraseña" required>
          </div>
          <button type="submit" class="btn-submit">Crear Cuenta</button>
        </form>
      </div>

    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      document.getElementById('tabBtn' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    }
  </script>
</body>
</html>
