<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Pedidos — JUSKEV</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/styles.css}">
  <link rel="stylesheet" th:href="@{/css/navbar.css}">
  <link rel="stylesheet" th:href="@{/css/mis-pedidos.css}">
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <meta name="user-authenticated" sec:authorize="isAuthenticated() and !isAnonymous()" content="true"/>
  <meta name="user-authenticated" sec:authorize="isAnonymous()" content="false"/>
</head>
<body>

  <div th:replace="~{fragments/navbar :: navbar}"></div>

  <main class="mispedidos-main">
    <div class="mispedidos-header">
      <div class="section-label"><b>Tu historial</b></div>
      <h1 class="section-title">Mis Pedidos</h1>
      <p class="mispedidos-saludo">Hola, <strong th:text="${usuario.nombre}">Cliente</strong>. Aquí están todos tus pedidos.</p>
    </div>

    <!-- Sin pedidos -->
    <div th:if="${#lists.isEmpty(pedidos)}" class="sin-pedidos">
      <div class="sin-pedidos-icono">📦</div>
      <p>Aún no tienes pedidos.</p>
      <a th:href="@{/catalogo}" class="btn-hero">Ir al Catálogo</a>
    </div>

    <!-- Lista de pedidos -->
    <div th:if="${!#lists.isEmpty(pedidos)}" class="pedidos-lista">
      <div th:each="pedido : ${pedidos}" class="pedido-card">

        <div class="pedido-header">
          <div class="pedido-id">Pedido #<span th:text="${pedido.id}"></span></div>
          <div class="pedido-estado"
               th:classappend="${pedido.estado.name() == 'COMPLETADO'} ? 'estado-completado' :
                               (${pedido.estado.name() == 'PENDIENTE'} ? 'estado-pendiente' :
                               (${pedido.estado.name() == 'CANCELADO'} ? 'estado-cancelado' : 'estado-proceso'))"
               th:text="${pedido.estado.name()}">
          </div>
        </div>

        <div class="pedido-meta">
          <span th:text="${#temporals.format(pedido.fechaPedido, 'dd MMM yyyy — HH:mm')}"></span>
        </div>

        <div class="pedido-items">
          <div th:each="detalle : ${pedido.detalles}" class="pedido-item-row">
            <img th:src="${detalle.producto.imagenUrl ?: '/img/logo.png'}"
                 th:alt="${detalle.producto.nombre}"
                 onerror="this.src='/img/logo.png'">
            <div class="pedido-item-info">
              <div class="pedido-item-nombre" th:text="${detalle.producto.nombre}"></div>

              <!-- Variantes: talla y color juntos en una línea -->
              <div class="pedido-item-variantes">
                <span th:if="${detalle.talla != null and !#strings.isEmpty(detalle.talla)}"
                      class="variante-tag variante-talla"
                      th:text="'Talla: ' + ${detalle.talla}"></span>
                <span th:if="${detalle.color != null and !#strings.isEmpty(detalle.color)}"
                      class="variante-tag variante-color">
                  <span class="color-dot"
                        th:style="'background:' + ${detalle.color}"></span>
                  <span th:text="${detalle.color}"></span>
                </span>
              </div>

              <div class="pedido-item-qty" th:text="'Cantidad: ' + ${detalle.cantidad}"></div>
            </div>
            <div class="pedido-item-precio"
                 th:text="${'$' + #numbers.formatInteger(detalle.subtotal, 0, 'COMMA')}"></div>
          </div>
        </div>

        <div class="pedido-footer">
          <div class="pedido-total">
            Total: <strong th:text="${'$' + #numbers.formatInteger(pedido.total, 0, 'COMMA')}"></strong>
          </div>
          <a th:href="@{/cliente/factura/{id}(id=${pedido.id})}"
             class="btn-factura" target="_blank">
            📄 Descargar Factura
          </a>
        </div>

      </div>
    </div>
  </main>

  <div th:replace="~{fragments/carrito :: carrito}"></div>
  <div th:replace="~{fragments/footer :: footer}"></div>
  <script th:src="@{/js/app.js}"></script>
  <script th:src="@{/js/catalogo.js}"></script>
</body>
</html>
