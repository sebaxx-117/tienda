<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos — JUSKEV Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/styles.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">

  <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

  <main class="admin-main">
    <div class="admin-topbar">
      <h1 class="admin-page-title">Pedidos</h1>
    </div>

    <div th:if="${exito}" class="alert-exito" th:text="${exito}"></div>

    <!-- TABS -->
    <div class="pedidos-tabs">
      <button class="pedidos-tab active" onclick="showTab('pendientes', this)">
        Pendientes
        <span class="tab-count" th:text="${#lists.size(pendientes)}">0</span>
      </button>
      <button class="pedidos-tab" onclick="showTab('completados', this)">
        Completados
        <span class="tab-count" th:text="${#lists.size(completados)}">0</span>
      </button>
    </div>

    <!-- PENDIENTES -->
    <div class="admin-card tab-panel" id="tab-pendientes">
      <table class="admin-table">
        <thead>
          <tr><th>ID</th><th>Cliente</th><th>Tipo</th><th>Total</th><th>Fecha</th><th>Acción</th></tr>
        </thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(pendientes)}">
            <td colspan="6" style="text-align:center;padding:2rem;color:#8a8a8a">Sin pedidos pendientes ✅</td>
          </tr>
          <tr th:each="p : ${pendientes}">
            <td th:text="'#' + ${p.id}"></td>
            <td th:text="${p.nombreCliente ?: 'Anónimo'}"></td>
            <td>
              <span class="tipo-badge"
                    th:classappend="${p.tipoVenta.name() == 'ONLINE'} ? 'tipo-online' : 'tipo-fisica'"
                    th:text="${p.tipoVenta.name()}"></span>
            </td>
            <td th:text="${'$' + #numbers.formatInteger(p.total, 0, 'COMMA')}"></td>
            <td th:text="${#temporals.format(p.fechaPedido, 'dd/MM/yy HH:mm')}"></td>
            <td class="acciones-col">
              <form th:action="@{/admin/pedidos/estado/{id}(id=${p.id})}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="hidden" name="estado" value="COMPLETADO">
                <button type="submit" class="btn-accion btn-completar" title="Marcar como completado">✅</button>
              </form>
              <a th:href="@{/admin/factura/{id}(id=${p.id})}" class="btn-accion btn-pdf" title="Descargar factura">📄</a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- COMPLETADOS -->
    <div class="admin-card tab-panel hidden" id="tab-completados">
      <table class="admin-table">
        <thead>
          <tr><th>ID</th><th>Cliente</th><th>Tipo</th><th>Total</th><th>Fecha</th><th>Factura</th></tr>
        </thead>
        <tbody>
          <tr th:if="${#lists.isEmpty(completados)}">
            <td colspan="6" style="text-align:center;padding:2rem;color:#8a8a8a">Sin pedidos completados aún</td>
          </tr>
          <tr th:each="p : ${completados}">
            <td th:text="'#' + ${p.id}"></td>
            <td th:text="${p.nombreCliente ?: 'Anónimo'}"></td>
            <td>
              <span class="tipo-badge"
                    th:classappend="${p.tipoVenta.name() == 'ONLINE'} ? 'tipo-online' : 'tipo-fisica'"
                    th:text="${p.tipoVenta.name()}"></span>
            </td>
            <td th:text="${'$' + #numbers.formatInteger(p.total, 0, 'COMMA')}"></td>
            <td th:text="${#temporals.format(p.fechaPedido, 'dd/MM/yy HH:mm')}"></td>
            <td>
              <a th:href="@{/admin/factura/{id}(id=${p.id})}" class="btn-accion btn-pdf">📄 PDF</a>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </main>

  <script>
    function showTab(tab, btn) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
      document.querySelectorAll('.pedidos-tab').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.remove('hidden');
      btn.classList.add('active');
    }
  </script>
</body>
</html>
