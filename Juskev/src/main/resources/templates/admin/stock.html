<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock — JUSKEV Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/styles.css}">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-body">

  <div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

  <main class="admin-main">
    <div class="admin-topbar">
      <h1 class="admin-page-title">Gestión de Stock</h1>
    </div>

    <div th:if="${exito}" class="alert-exito" th:text="${exito}"></div>

    <!-- Alertas rápidas -->
    <div class="stock-alertas">
      <div class="alerta-card alerta-critica" th:if="${!#lists.isEmpty(sinStock)}">
        ❌ <strong th:text="${#lists.size(sinStock)}"></strong> productos sin stock
      </div>
      <div class="alerta-card alerta-baja" th:if="${!#lists.isEmpty(stockBajo)}">
        ⚠️ <strong th:text="${#lists.size(stockBajo)}"></strong> productos con stock bajo (≤5 und.)
      </div>
    </div>

    <div class="admin-card">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Imagen</th>
            <th>Producto</th>
            <th>Categoría</th>
            <th>Stock actual</th>
            <th>Actualizar stock</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="p : ${todos}">
            <td>
              <img th:src="${p.imagenUrl ?: '/img/logo.png'}" th:alt="${p.nombre}"
                   onerror="this.src='/img/logo.png'" class="producto-thumb-admin">
            </td>
            <td>
              <div class="producto-nombre-admin" th:text="${p.nombre}"></div>
              <div class="producto-marca-admin" th:text="${p.marca}"></div>
            </td>
            <td th:text="${#strings.capitalize(p.categoria.name())}"></td>
            <td>
              <span th:text="${p.stock}"
                    th:classappend="${p.stock == 0} ? 'stock-cero' : (${p.stock <= 5} ? 'stock-bajo-label' : 'stock-ok')">
              </span>
            </td>
            <td>
              <form th:action="@{/admin/productos/stock/{id}(id=${p.id})}"
                    method="post" class="stock-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <input type="number" name="stock" th:value="${p.stock}"
                       min="0" class="stock-input">
                <button type="submit" class="btn-accion btn-completar">✔</button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </main>

</body>
</html>
